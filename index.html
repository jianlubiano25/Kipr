<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>kipr</title>

<!-- PWA / iOS home screen -->
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="kipr"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#1b4d35"/>
<meta name="description" content="kipr — Filipino household budget tracker for expenses, electricity, and pantry."/>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"/>

<link rel="apple-touch-icon" href="Kipr-icon.png"/>

<link rel="stylesheet" href="styles.css?v=20260607-recent-wrap"/>

<style>
  /*
   * Body starts as the splash background so slow app boots do not flash black.
   * Once app.js renders, body.app-ready restores the header green around the
   * safe-area while #app content sits above it.
   * The home-indicator strip (iPhone bottom) is covered by tabbar's
   * padding-bottom: max(env(safe-area-inset-bottom,0px),0px) in CSS.
   */
  body { background: #f5f5f5; }
  body.app-ready { background: #1b4d35; }
  #app { background: #f4f0ea; }
  #splash {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f5f5;
    transition: opacity .18s ease, visibility .18s ease;
  }
  #splash.splash-hide {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  #splash img {
    width: min(48vw, 190px);
    height: auto;
    display: block;
    opacity: 0;
    animation: splashLogoIn .24s ease .16s forwards;
  }
  @keyframes splashLogoIn { to { opacity: 1; } }
</style>
<script>
  const standaloneQuery = window.matchMedia('(display-mode: standalone)');
  const setStandaloneMode = () => {
    document.documentElement.classList.toggle('app-standalone', !!window.navigator.standalone || standaloneQuery.matches);
  };
  setStandaloneMode();
  standaloneQuery.addEventListener?.('change', setStandaloneMode);
</script>
</head>
<body>
<div id="splash" aria-hidden="true"><img src="Kipr-logo-cropped.png" alt=""/></div>
<div id="app"></div>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="app.js?v=20260607-recent-wrap"></script>
</body>
</html>
